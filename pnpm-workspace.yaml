supportedArchitectures:
  os:
    - current
    - linux
  cpu:
    - current
    - x64
  libc:
    - current
    - glibc

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@prisma/client'
  - '@prisma/engines'
  - '@tailwindcss/oxide'
  - esbuild
  - lefthook
  - msw
  - prisma
  - sharp

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  lefthook: true
  msw: true
  prisma: true
  sharp: true
