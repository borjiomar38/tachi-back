x-tachi-json-logging: &tachi-json-logging
  driver: json-file
  options:
    max-file: '7'
    max-size: 50m

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: tachi-caddy
    logging: *tachi-json-logging
    env_file:
      - ${TACHI_CADDY_ENV_FILE:-/opt/tachi-back/.env.caddy}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile.multi-env:/etc/caddy/Caddyfile:ro
      - /var/log/tachi-back/caddy:/var/log/caddy
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    networks:
      - proxy

volumes:
  caddy-data:
    name: tachi-caddy-data
  caddy-config:
    name: tachi-caddy-config

networks:
  proxy:
    external: true
    name: ${TACHI_PROXY_NETWORK:-tachi-proxy}
