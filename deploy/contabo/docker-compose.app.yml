x-tachi-json-logging: &tachi-json-logging
  driver: json-file
  options:
    max-file: '7'
    max-size: 50m

services:
  app:
    image: tachi-back:${TACHI_ENV_SLUG:?set TACHI_ENV_SLUG}-contabo
    container_name: tachi-${TACHI_ENV_SLUG}-app
    logging: *tachi-json-logging
    build:
      context: ../..
      dockerfile: deploy/contabo/Dockerfile
      target: runner
      args:
        VITE_BASE_URL: ${VITE_BASE_URL:?set VITE_BASE_URL}
        VITE_ENV_NAME: ${VITE_ENV_NAME:-PRODUCTION}
        VITE_ENV_EMOJI: ${VITE_ENV_EMOJI:-}
        VITE_ENV_COLOR: ${VITE_ENV_COLOR:-plum}
        VITE_IS_DEMO: ${VITE_IS_DEMO:-false}
        VITE_LEMONSQUEEZY_STORE_URL: ${VITE_LEMONSQUEEZY_STORE_URL:-}
        VITE_S3_BUCKET_PUBLIC_URL: ${VITE_S3_BUCKET_PUBLIC_URL:?set VITE_S3_BUCKET_PUBLIC_URL}
        VITE_GOOGLE_SITE_VERIFICATION: ${VITE_GOOGLE_SITE_VERIFICATION:-}
    env_file:
      - ${TACHI_ENV_FILE:?set TACHI_ENV_FILE}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      SEO_DISTRIBUTION_AGENT_STATE_DIR: /var/lib/tachi-seo-distribution-agent
      SEO_DISTRIBUTION_AGENT_TRIGGER_FILE: /var/lib/tachi-seo-distribution-agent/run-now
      SEO_DISTRIBUTION_DAILY_CRON_SCHEDULE: 0 3 * * *
      MANHWA_PRIVATE_ROOT: /app/docs/manhwa/private
    volumes:
      - ${TACHI_SEO_AGENT_STATE_DIR:-/var/lib/tachi-seo-distribution-agent}:/var/lib/tachi-seo-distribution-agent:rw
      - ${TACHI_MANHWA_PRIVATE_DIR:-/opt/tachi-back/docs/manhwa/private}:/app/docs/manhwa/private:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - private
      - proxy

  migrate:
    image: tachi-back-migrator:${TACHI_ENV_SLUG:?set TACHI_ENV_SLUG}-contabo
    container_name: tachi-${TACHI_ENV_SLUG}-migrate
    logging: *tachi-json-logging
    build:
      context: ../..
      dockerfile: deploy/contabo/Dockerfile
      target: migrator
    env_file:
      - ${TACHI_ENV_FILE:?set TACHI_ENV_FILE}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    networks:
      - private
      - proxy

  postgres:
    image: postgres:17
    container_name: tachi-${TACHI_ENV_SLUG}-postgres
    logging: *tachi-json-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-backups/${TACHI_ENV_SLUG}:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - private

volumes:
  postgres-data:
    name: tachi-${TACHI_ENV_SLUG}-postgres-data

networks:
  private:
    internal: true
  proxy:
    external: true
    name: ${TACHI_PROXY_NETWORK:-tachi-proxy}
